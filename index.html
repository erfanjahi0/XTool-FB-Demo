        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }

                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-gray-400">Ad Account ID</label>
                        <input type="text" id="oc_adId" placeholder="Account ID (no act_)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="text-sm font-semibold text-gray-400">Destination Link</label>

                    <div class="md:col-span-2 space-y-2">

                        <textarea id="oc_message" placeholder="Tell people about your offer..." class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl h-24 focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                    </div>
                    
                    <!-- Image Uploader -->

                        <input type="file" id="oc_image" accept="image/*" class="hidden" onchange="previewImage(this)">

                            <span id="fileNameDisplay" class="block text-sm text-gray-400">Click to upload Card Thumbnail</span>
                        </label>
                        <div id="imagePreview" class="mt-4 hidden text-center"></div>

                    <button onclick="runOneCard()" class="md:col-span-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 active:scale-95">
                        <i class="fa-solid fa-paper-plane mr-2"></i> Publish One Card V2
                    </button>
                </div>
            </div>
        </div>

        <!-- SWIPE-UP TAB -->
        <div id="swipeup" class="tab-content space-y-6">

    <script>
        // 1. UI LOGIC
        function switchTab(id) {
            // Hide all content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // Reset all buttons
            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500');
            });

            // Activate selected
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active-tab');
            document.getElementById('tab-' + id).classList.remove('text-gray-500');
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileNameDisplay');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" class="mx-auto shadow-lg">`;
                    preview.classList.remove('hidden');
                    fileName.innerText = "Selected: " + input.files[0].name;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 2. XTOOL BRIDGE LOGIC
        const XTool = {
            token: null,
            init: function() {
                window.addEventListener("message", (event) => {
                    // Listen for session response
                    if (event.data.type === "XTOOL_SESSION_RESPONSE") {
                        if (event.data.payload && event.data.payload.token) {
                            this.token = event.data.payload.token;
                            this.updateStatus(true);
                        } else {
                            this.updateStatus(false);
                        }
                    }
                    // Listen for execution response
                    if (event.data.type === "XTOOL_RESPONSE") {
                        this.handleResponse(event.data.response);
                    }
                });
                
                // Request session from extension
                setInterval(() => window.postMessage({ type: "XTOOL_FETCH_SESSION" }, "*"), 2000);
            },
            
            updateStatus: function(connected) {
                const s = document.getElementById("connectionStatus");
                if (connected) {
                    s.innerHTML = '<span class="h-2 w-2 bg-green-500 rounded-full"></span><span class="text-xs text-green-500 font-bold uppercase tracking-widest">Bridge Connected</span>';
                } else {
                    s.innerHTML = '<span class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></span><span class="text-xs text-red-500 font-bold uppercase tracking-widest">Open FB Ads Manager</span>';
                }
            },

            execute: function(tool, payload) {
                if (!this.token) return alert("Error: Extension not connected. Please open Facebook Ads Manager.");
                window.postMessage({ type: "XTOOL_EXECUTE", tool, payload }, "*");
            },

            handleResponse: function(res) {
                const log = document.getElementById('statusLog');
                log.classList.remove('hidden');
                
                if (res.status === "success") {
                    log.innerHTML += `<div class="text-green-400 mb-1">✅ Success: Action completed. ID: ${res.data?.id || 'N/A'}</div>`;
                } else {
                    log.innerHTML += `<div class="text-red-400 mb-1">❌ Error: ${res.message}</div>`;
                }
                log.scrollTop = log.scrollHeight;
            }
        };

        // Initialize Bridge
        XTool.init();

        // 3. ACTION HANDLERS
        async function runOneCard() {
            const fileInput = document.getElementById('oc_image');
            const file = fileInput.files[0];
            
            const payload = {
                pageId: document.getElementById('oc_pageId').value,
                adAccountId: document.getElementById('oc_adId').value,
                link: document.getElementById('oc_link').value,
                headline: document.getElementById('oc_headline').value,
                message: document.getElementById('oc_message').value
            };

            if (!payload.pageId || !payload.adAccountId) return alert("Please fill in Page ID and Ad Account ID");

            // Handle Image Upload
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    payload.imageData = reader.result; // Base64 string
                    XTool.execute("ONE_CARD", payload);
                };
                reader.readAsDataURL(file);
            } else {
                XTool.execute("ONE_CARD", payload);
            }
        }

        function runSwipeUp() {
            XTool.execute("SWIPE_UP", {
                pageId: document.getElementById('su_pageId').value,
                videoId: document.getElementById('su_videoId').value,
                link: document.getElementById('su_link').value,
                message: document.getElementById('su_message').value
            });
        }

        function runCarousel() {
            const vids = document.getElementsByClassName('cr_vid');
            const titles = document.getElementsByClassName('cr_title');
            const links = document.getElementsByClassName('cr_link');
            const items = [];
            
            for(let i=0; i<vids.length; i++) {
                if(vids[i].value) {
                    items.push({ 
                        video_id: vids[i].value, 
                        title: titles[i].value, 
                        link: links[i].value 
                    });
                }
            }
            
            if(items.length === 0) return alert("Please enter at least one video card.");
            
            XTool.execute("CAROUSEL", {
                pageId: document.getElementById('cr_pageId').value,
                message: document.getElementById('cr_message').value,
                items: items
            });
        }
    </script>
</body>

    <script>
        // 1. UI LOGIC
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-tab', 'text-white'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active-tab');
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileNameDisplay');
            if (input.files && input.files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" class="mx-auto shadow-lg">`;
                    preview.classList.remove('hidden');
                    fileName.innerText = "Selected: " + input.files.name;
                }
                reader.readAsDataURL(input.files);
            }
        }

        // 2. XTOOL BRIDGE LOGIC
        const XTool = {
            token: null,
            init: function() {
                window.addEventListener("message", (event) => {
                    if (event.data.type === "XTOOL_SESSION_RESPONSE") {
                        if (event.data.payload && event.data.payload.token) {
                            this.token = event.data.payload.token;
                            this.updateStatus(true);
                        } else {
                            this.updateStatus(false);
                        }
                    }
                    if (event.data.type === "XTOOL_RESPONSE") {
                        this.handleResponse(event.data.response);
                    }
                });
                // Poke the extension
                setInterval(() => window.postMessage({ type: "XTOOL_FETCH_SESSION" }, "*"), 2000);
            },
            updateStatus: function(ok) {
                const s = document.getElementById("connectionStatus");
                s.innerHTML = ok ? 
                    '<span class="h-2 w-2 bg-green-500 rounded-full"></span><span class="text-xs text-green-500 font-bold uppercase">Bridge Live</span>' : 
                    '<span class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></span><span class="text-xs text-red-500 font-bold uppercase">Open FB Ads Manager</span>';
            },
            handleResponse: function(res) {
                const log = document.getElementById("statusLog");
                log.classList.remove("hidden");
                if (res.status === "success") {
                    log.innerHTML += `<div class="text-green-400">✅ Success: Post Created ID ${res.data.id}</div>`;
                    alert("Published Successfully!");
                } else {
                    log.innerHTML += `<div class="text-red-400">❌ Error: ${res.message}</div>`;
                    alert("Error: " + res.message);
                }
            }
        };

        XTool.init();

        // 3. PUBLISH FUNCTION
        async function runOneCard() {
            const btn = document.getElementById("publishBtn");
            const file = document.getElementById('oc_image').files;
            
            const payload = {
                pageId: document.getElementById('oc_pageId').value,
                adAccountId: document.getElementById('oc_adId').value,
                link: document.getElementById('oc_link').value,
                headline: document.getElementById('oc_headline').value,
                message: document.getElementById('oc_message').value
            };

            if (!payload.pageId || !payload.adAccountId) return alert("Please fill in Page ID and Ad Account ID");

            btn.innerText = "Publishing...";
            btn.disabled = true;

            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    window.postMessage({ 
                        type: "XTOOL_EXECUTE", 
                        tool: "ONE_CARD", 
                        payload: { ...payload, imageData: reader.result } 
                    }, "*");
                    btn.innerText = "Publish Post Now";
                    btn.disabled = false;
                };
                reader.readAsDataURL(file);
            } else {
                window.postMessage({ type: "XTOOL_EXECUTE", tool: "ONE_CARD", payload }, "*");
                btn.innerText = "Publish Post Now";
                btn.disabled = false;
            }
        }
    </script>

        </div>

        <div id="carousel" class="tab-content space-y-6">
            <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fa-solid fa-images mr-3 text-purple-500"></i> Video Carousel</h2>
                <div class="space-y-4">
                    <input type="text" id="cr_pageId" placeholder="Page ID" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none">
                    <textarea id="cr_message" placeholder="Main Caption..." class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl outline-none"></textarea>
                    
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 space-y-3">
                        <span class="text-xs font-black text-purple-400 uppercase">Card 1 Data</span>
                        <input type="text" placeholder="Video ID" class="cr_vid w-full bg-gray-800 p-2 rounded border border-gray-700 outline-none">
                        <input type="text" placeholder="Title" class="cr_title w-full bg-gray-800 p-2 rounded border border-gray-700 outline-none">
                        <input type="text" placeholder="Link" class="cr_link w-full bg-gray-800 p-2 rounded border border-gray-700 outline-none">
                    </div>
                    
                    <button onclick="runCarousel()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl shadow-lg transition">
                        Post Multi-Video Carousel
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500');
            });
            document.getElementById(id).classList.add('active');
            const activeBtn = document.getElementById('tab-' + id);
            activeBtn.classList.add('active-tab');
            activeBtn.classList.remove('text-gray-500');
        }

        // --- XTOOL CONNECTOR ---
        const XTool = {
            connected: false,
            init: function() {
                window.addEventListener("message", (event) => {
                    if (event.data.type === "XTOOL_SESSION_RESPONSE") {
                        if (event.data.payload.token) {
                            this.connected = true;
                            this.updateStatus(true);
                        } else {
                            this.updateStatus(false);
                        }
                    }
                    if (event.data.type === "XTOOL_RESPONSE") {
                        this.handleResult(event.data.response);
                    }
                });
                // Initial check
                setTimeout(() => window.postMessage({ type: "XTOOL_FETCH_SESSION" }, "*"), 1000);
            },

            updateStatus: function(success) {
                const el = document.getElementById("connectionStatus");
                if (success) {
                    el.innerHTML = '<span class="h-2 w-2 rounded-full bg-green-500"></span><span class="text-xs text-green-500 font-bold uppercase tracking-widest">Bridge Connected</span>';
                } else {
                    el.innerHTML = '<span class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span><span class="text-xs text-red-500 font-bold uppercase tracking-widest">Login to Ads Manager</span>';
                }
            },

            execute: function(tool, payload) {
                if (!this.connected) return alert("Please log in to Facebook Ads Manager first!");
                window.postMessage({ type: "XTOOL_EXECUTE", tool, payload }, "*");
            },

            handleResult: function(res) {
                if (res.status === "success") {
                    alert("🚀 Success! Your post is live. ID: " + (res.data.id || "Check your Page"));
                } else {
                    alert("❌ Error: " + res.message);
                }
            }
        };

        XTool.init();

        // --- ACTION HANDLERS ---
        function runOneCard() {
            const file = document.getElementById('oc_image').files;
            const data = {
                pageId: document.getElementById('oc_pageId').value,
                adAccountId: document.getElementById('oc_adId').value,
                link: document.getElementById('oc_link').value,
                headline: document.getElementById('oc_headline').value,
                message: document.getElementById('oc_message').value
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    data.imageData = reader.result;
                    XTool.execute("ONE_CARD", data);
                };
                reader.readAsDataURL(file);
            } else {
                XTool.execute("ONE_CARD", data);
            }
        }

        function runSwipeUp() {
            XTool.execute("SWIPE_UP", {
                pageId: document.getElementById('su_pageId').value,
                videoId: document.getElementById('su_videoId').value,
                link: document.getElementById('su_link').value,
                message: document.getElementById('su_message').value
            });
        }

        function runCarousel() {
            const vids = document.getElementsByClassName('cr_vid');
            const titles = document.getElementsByClassName('cr_title');
            const links = document.getElementsByClassName('cr_link');
            const items = [];
            for(let i=0; i<vids.length; i++) {
                if(vids[i].value) items.push({ video_id: vids[i].value, title: titles[i].value, link: links[i].value });
            }
            XTool.execute("CAROUSEL", {
                pageId: document.getElementById('cr_pageId').value,
                message: document.getElementById('cr_message').value,
                items: items
            });
        }
    </script>
</body>
</html>
